name: Generate Daily AI Level

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual trigger with custom parameters
    inputs:
      difficulty:
        description: 'Level difficulty (easy, medium, hard, expert)'
        required: true
        default: 'medium'
        type: choice
        options:
          - easy
          - medium
          - hard
          - expert
      length:
        description: 'Level length (short, medium, long)'
        required: true
        default: 'medium'
        type: choice
        options:
          - short
          - medium
          - long
      theme:
        description: 'Level theme (mixed, platforming, puzzle, combat, chaos)'
        required: true
        default: 'mixed'
        type: choice
        options:
          - mixed
          - platforming
          - puzzle
          - combat
          - chaos

jobs:
  generate-level:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Generate level
        run: |
          cd obby-builder-src/ai-generator
          python generate_level.py \
            ${{ github.event.inputs.difficulty || 'medium' }} \
            ${{ github.event.inputs.length || 'medium' }} \
            ${{ github.event.inputs.theme || 'mixed' }}
      
      - name: Copy generated level to levels directory
        run: |
          mkdir -p obby-builder-src/assets/levels
          cp obby-builder-src/ai-generator/generated_level.json \
             obby-builder-src/assets/levels/daily_challenge.json
      
      - name: Update level manifest
        run: |
          # Create or update manifest with metadata
          cat > obby-builder-src/assets/levels/manifest.json << EOF
          {
            "daily_challenge": {
              "file": "daily_challenge.json",
              "generated_at": "$(date -Iseconds)",
              "difficulty": "${{ github.event.inputs.difficulty || 'medium' }}",
              "length": "${{ github.event.inputs.length || 'medium' }}",
              "theme": "${{ github.event.inputs.theme || 'mixed' }}",
              "type": "ai-generated"
            }
          }
          EOF
      
      - name: Commit and push generated level
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add obby-builder-src/assets/levels/
          if ! git diff --staged --quiet; then
            git commit -m "🤖 AI Generated Daily Challenge Level [$(date +%Y-%m-%d)]
            
            Difficulty: ${{ github.event.inputs.difficulty || 'medium' }}
            Length: ${{ github.event.inputs.length || 'medium' }}
            Theme: ${{ github.event.inputs.theme || 'mixed' }}
            
            Auto-generated by GitHub Actions using AI level generator."
            git push
          else
            echo "No changes to commit"
          fi
